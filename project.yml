name: StellaFish
options:
  bundleIdPrefix: com.stellafish
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    ENABLE_PREVIEWS: YES

schemes:
  StellaFish:
    build:
      targets:
        StellaFish: all
        StellaFishTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: StellaFishTests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  StellaFish:
    type: application
    platform: iOS
    sources:
      - path: StellaFish
    resources:
      - path: StellaFish/Resources
    settings:
      base:
        INFOPLIST_FILE: StellaFish/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.stellafish.app
        PRODUCT_NAME: StellaFish
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_TESTABILITY: YES
    dependencies: []

  StellaFishTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StellaFishTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stellafish.tests
        PRODUCT_NAME: StellaFishTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/StellaFish.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/StellaFish
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: StellaFish
